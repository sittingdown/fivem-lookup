<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiveM Server Lookup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0f;
      --surface:    #16161a;
      --surface2:   #1e1e24;
      --border:     #2a2a33;
      --accent:     #7c6fe0;
      --text:       #e8e8f0;
      --muted:      #888899;
      --green:      #4ade80;
      --red:        #f87171;
      --yellow:     #facc15;
      --radius:     10px;
      --gap:        16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 40px 16px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.9rem;
    }

    /* ── Search ── */
    .search-wrap {
      max-width: 520px;
      margin: 0 auto 40px;
    }

    .search-bar {
      display: flex;
      gap: 10px;
    }

    .search-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input::placeholder { color: var(--muted); }
    .search-bar input:focus { border-color: var(--accent); }

    .search-bar button {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 13px 24px;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .search-bar button:hover   { opacity: 0.85; }
    .search-bar button:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint {
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
      margin-top: 10px;
    }

    /* ── Status messages ── */
    #error-msg {
      text-align: center;
      color: var(--red);
      font-size: 0.88rem;
      margin-bottom: 16px;
      display: none;
    }

    #loading {
      display: none;
      text-align: center;
      padding: 48px 0;
    }

    .spinner {
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: 0.85rem; }

    /* ── Results container ── */
    #results {
      max-width: 920px;
      margin: 0 auto;
      display: none;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Server header card ── */
    .server-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: var(--gap);
    }

    .server-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .server-id-row {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      flex: 1;
      min-width: 0;
    }

    .server-icon {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      flex-shrink: 0;
      background: var(--surface2);
      object-fit: cover;
    }

    .server-name {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.3;
      word-break: break-word;
    }

    .server-owner {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 7px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .server-owner img {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .server-owner a { color: var(--text); text-decoration: none; font-weight: 600; }
    .server-owner a:hover { color: var(--accent); }

    .badge-green  { color: var(--green);  border-color: color-mix(in srgb, var(--green)  35%, transparent); }
    .badge-yellow { color: var(--yellow); border-color: color-mix(in srgb, var(--yellow) 35%, transparent); }
    .badge-red    { color: var(--red);    border-color: color-mix(in srgb, var(--red)    35%, transparent); }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
      align-items: flex-start;
    }

    .btn {
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.83rem;
      font-weight: 600;
      padding: 9px 16px;
      text-decoration: none;
      transition: opacity 0.15s;
      display: inline-block;
    }

    .btn:hover { opacity: 0.82; }
    .btn-accent  { background: var(--accent); }
    .btn-discord { background: #5865f2; }

    .server-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      padding: 4px 10px;
      line-height: 1.5;
    }

    .badge strong { color: var(--text); font-weight: 600; }

    .server-desc {
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.65;
      margin-top: 16px;
      max-height: 72px;
      overflow: hidden;
      transition: max-height 0.3s ease;
      position: relative;
    }

    .server-desc.expanded { max-height: 600px; }

    .desc-toggle {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 6px;
      padding: 0;
    }

    /* ── Stat card grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--gap);
      margin-bottom: var(--gap);
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
    }

    .card-label {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* Players card */
    .player-count {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -1px;
    }

    .player-count .denom {
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0;
    }

    .player-bar-wrap {
      background: var(--surface2);
      border-radius: 4px;
      height: 5px;
      margin-top: 14px;
      overflow: hidden;
    }

    .player-bar {
      background: var(--accent);
      border-radius: 4px;
      height: 100%;
      transition: width 0.5s ease;
    }

    .ping-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .ping-stat { text-align: center; flex: 1; }

    .ping-stat-val {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .ping-stat-lbl {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .col-green { color: var(--green); }
    .col-red   { color: var(--red); }
    .col-muted { color: var(--muted); }

    /* Anti-cheat card */
    .ac-status {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .ac-detected { color: var(--green); }
    .ac-none     { color: var(--muted); }

    .ac-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .chip {
      border-radius: 5px;
      font-size: 0.74rem;
      font-weight: 600;
      padding: 3px 9px;
    }

    .chip-green {
      background: color-mix(in srgb, var(--green) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--green) 28%, transparent);
      color: var(--green);
    }

    /* Resources card */
    .big-num { font-size: 2rem; font-weight: 700; }
    .sub-text { color: var(--muted); font-size: 0.8rem; margin-top: 5px; }

    /* Server stack card */
    .stack-rows { display: flex; flex-direction: column; gap: 0; margin-top: 2px; }

    .stack-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .stack-row:last-child { border-bottom: none; padding-bottom: 0; }
    .stack-row:first-child { padding-top: 0; }

    .stack-lbl {
      color: var(--muted);
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .stack-val { font-size: 0.88rem; font-weight: 600; }

    /* ── Full-width cards ── */
    .full-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: var(--gap);
    }

    .full-card:last-child { margin-bottom: 0; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    /* Player list */
    .filter-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      outline: none;
      padding: 6px 12px;
      width: 170px;
      transition: border-color 0.2s;
    }

    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--muted); }

    .player-table {
      width: 100%;
      border-collapse: collapse;
    }

    .player-table th {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      padding: 0 8px 10px;
      text-align: left;
      text-transform: uppercase;
    }

    .player-table th:first-child { padding-left: 0; width: 52px; }

    .player-table td {
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      padding: 9px 8px;
    }

    .player-table td:first-child { padding-left: 0; color: var(--muted); }

    .player-table tbody tr:hover td { background: var(--surface2); }

    .ping-pill {
      border-radius: 5px;
      display: inline-block;
      font-size: 0.74rem;
      font-weight: 600;
      padding: 2px 8px;
    }

    .ping-good { background: color-mix(in srgb, var(--green)  12%, transparent); color: var(--green); }
    .ping-mid  { background: color-mix(in srgb, var(--yellow) 12%, transparent); color: var(--yellow); }
    .ping-bad  { background: color-mix(in srgb, var(--red)    12%, transparent); color: var(--red); }

    .empty-state {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 20px 0;
      text-align: center;
    }

    .player-name {
      cursor: pointer;
      transition: color 0.15s;
      user-select: none;
    }

    .player-name:hover  { color: var(--accent); }
    .player-name.open   { color: var(--accent); }

    .id-row td {
      background: var(--surface2) !important;
      border-top: none !important;
      padding: 12px 8px 14px 52px;
    }

    .id-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .id-entry {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.82rem;
    }

    .id-type {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      width: 72px;
      flex-shrink: 0;
    }

    .id-val {
      color: var(--text);
      font-family: 'Consolas', 'Menlo', monospace;
      font-size: 0.78rem;
      word-break: break-all;
    }

    .id-val a {
      color: var(--accent);
      text-decoration: none;
    }

    .id-val a:hover { text-decoration: underline; }

    /* Tags */
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 7px; }

    .tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-size: 0.77rem;
      padding: 4px 10px;
    }

    /* Vars table */
    .vars-table { width: 100%; border-collapse: collapse; }

    .vars-table td {
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      padding: 9px 0;
      vertical-align: top;
    }

    .vars-table td:first-child {
      color: var(--muted);
      padding-right: 20px;
      white-space: nowrap;
      width: 38%;
    }

    .vars-table td:last-child { word-break: break-word; }

    /* Resource grid */
    .resource-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 188px;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    .resource-grid.expanded { max-height: 9999px; }

    .res-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-size: 0.72rem;
      padding: 3px 8px;
    }

    .res-chip.ac-highlight {
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border-color: color-mix(in srgb, var(--accent) 32%, transparent);
      color: var(--accent);
    }

    .toggle-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.77rem;
      margin-top: 12px;
      padding: 5px 13px;
      transition: border-color 0.15s, color 0.15s;
    }

    .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Recent servers ── */
    .recent-wrap {
      max-width: 520px;
      margin: -24px auto 32px;
    }

    .recent-label {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .recent-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .recent-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      padding: 6px 8px 6px 13px;
      transition: border-color 0.15s, background 0.15s;
      max-width: 230px;
    }

    .recent-chip:hover {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .recent-chip:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .recent-chip-text { min-width: 0; }

    .recent-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.05rem;
      line-height: 1;
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .recent-remove:hover { color: var(--red); background: var(--bg); }

    .recent-chip-name {
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .recent-chip-code {
      color: var(--muted);
      font-size: 0.68rem;
      margin-top: 1px;
    }

    /* ── Refresh / freshness / copy ── */
    .freshness {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-top: 14px;
      font-size: 0.76rem;
      color: var(--muted);
    }

    .link-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.76rem;
      font-weight: 600;
      padding: 0;
    }

    .link-btn:hover:not(:disabled) { text-decoration: underline; }
    .link-btn:disabled { opacity: 0.5; cursor: default; }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-ghost:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }
    .btn-ghost.copied { opacity: 1; border-color: var(--green); color: var(--green); }

    .badge-copy { cursor: pointer; transition: border-color 0.15s; }
    .badge-copy:hover { border-color: var(--accent); }
    .badge-copy.copied { color: var(--green); border-color: var(--green); }

    .id-copy {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 2px 7px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .id-copy:hover { border-color: var(--accent); color: var(--accent); }
    .id-copy.copied { border-color: var(--green); color: var(--green); }

    /* ── Mobile tweaks ── */
    @media (max-width: 500px) {
      .server-title-row { flex-direction: column; }
      .btn-group { width: 100%; }
      .btn { flex: 1; text-align: center; }
      .filter-input { width: 120px; }
    }
  </style>
</head>
<body>

<header>
  <h1>FiveM Server Lookup</h1>
  <p>Enter a server code to view live server information</p>
</header>

<div class="search-wrap">
  <div class="search-bar">
    <input id="code-input" type="text" placeholder="Server code (e.g. abc123)" maxlength="10" />
    <button id="lookup-btn" onclick="lookup()">Look Up</button>
  </div>
  <p class="hint">Find the server code in the FiveM server browser or a server's Discord</p>
  <p class="hint" style="margin-top:6px">
    Not sure of the code?
    <a href="https://servers.fivem.net" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;font-weight:600">Browse the FiveM server list ↗</a>
  </p>
</div>

<div class="recent-wrap" id="recent-wrap" style="display:none">
  <div class="recent-label">Recent Servers</div>
  <div class="recent-chips" id="recent-chips"></div>
</div>

<p id="error-msg"></p>

<div id="loading">
  <div class="spinner"></div>
  <p>Fetching server data…</p>
</div>

<div id="results"></div>

<script>
  const KNOWN_AC = [
    // ── Confirmed — resource name sourced from official docs / GitHub ─────────
    { keys: ['warden', 'warden-ac', 'warden_ac'],
                                                          label: 'Warden' },
    { keys: ['electronac', 'electron_ac', 'electron-ac', 'cubic_ac'],
                                                          label: 'Electron AC' },       // ElectronAC → lowercase = electronac
    { keys: ['fiveguard'],                                label: 'FiveGuard' },
    { keys: ['badger-anticheat', 'badger_anticheat'],     label: 'Badger Anti-Cheat' }, // docs: "name must stay Badger-Anticheat"
    { keys: ['screenshot-basic'],                         label: 'Screenshooter' },     // citizenfx/screenshot-basic
    { keys: ['txadmin'],                                  label: 'txAdmin' },
    { keys: ['wolfshield'],                               label: 'WolfShield' },         // tebex: "ensure WolfShield"
    { keys: ['reaperac', 'reaper_ac', 'reaper-ac'],       label: 'Reaper AC' },
    { keys: ['sentinelac', 'sentinel_ac', 'sentinel-ac'], label: 'Sentinel AC' },
    { keys: ['nexus-anticheat', 'nexus_ac', 'nexus-ac'],  label: 'Nexus AC' },          // github: Nexus-AntiCheat
    { keys: ['secureserve'],                              label: 'SecureServe' },        // "ensure SecureServe"
    { keys: ['fireac'],                                   label: 'FIREAC' },             // github: AmirrezaJaberi/FIREAC
    { keys: ['finiac'],                                   label: 'FiniAC' },             // docs: "ensure FiniAC"
    { keys: ['waveshield'],                               label: 'WaveShield' },         // docs: "ensure WaveShield"
    { keys: ['versusac'],                                 label: 'VersusAC' },           // docs: "start VersusAC"
    { keys: ['valkyrie'],                                 label: 'Valkyrie' },           // github: NotSomething0/Valkyrie
    { keys: ['pegasusac'],                                label: 'PegasusAC' },          // docs: PegasusAC/server/sv_config.lua
    { keys: ['icarusadvancedanticheat'],                  label: 'Icarus AC' },          // github: EinS4ckZwiebeln/IcarusAdvancedAnticheat
    { keys: ['anticheese-anticheat', 'anticheese'],       label: 'AntiCheese' },         // github: Blumlaut/anticheese-anticheat
    { keys: ['tigoanticheat'],                            label: 'Tigo AC' },            // docs: "start TigoAntiCheat"
    { keys: ['fenixac'],                                  label: 'FenixAC' },            // github: turangarusso/RuxoAC — folder "FenixAC_3.0"

    // ── Community-observed — specific enough keys, low false-positive risk ────
    { keys: ['ksac'],                                     label: 'KSAC' },
    { keys: ['illusive_ac', 'illusive-ac'],               label: 'Illusive AC' },
    { keys: ['shield_ac', 'shield-ac'],                   label: 'Shield AC' },
    { keys: ['anticheat', 'anticheat-v2', 'anti_cheat'],  label: 'AntiCheat' },
    { keys: ['mn_anticheat'],                             label: 'MN AntiCheat' },
    { keys: ['nova_ac', 'nova-ac'],                       label: 'Nova AC' },
    { keys: ['quantum_ac', 'quantum-ac'],                 label: 'Quantum AC' },
    { keys: ['pma-ac', 'pma_ac'],                         label: 'PMA AC' },
    { keys: ['cerberus_ac', 'cerberus-ac'],               label: 'Cerberus AC' },
    { keys: ['guardian_ac', 'guardian-ac'],               label: 'Guardian AC' },
    { keys: ['pro_ac', 'pro-ac'],                         label: 'ProAC' },
    { keys: ['nightfall_ac', 'nightfall-ac'],             label: 'Nightfall AC' },
    { keys: ['apex_ac', 'apex-ac'],                       label: 'Apex AC' },
    { keys: ['omega_ac', 'omega-ac'],                     label: 'Omega AC' },
    { keys: ['phantom_ac', 'phantom-ac'],                 label: 'Phantom AC' },
    { keys: ['spectre_ac', 'spectre-ac'],                 label: 'Spectre AC' },
    { keys: ['blacklist_ac', 'blacklist-ac'],             label: 'Blacklist AC' },
    { keys: ['overwatch_ac'],                             label: 'Overwatch AC' },
  ];

  const FRAMEWORKS = [
    { keys: ['qbx_core'],    label: 'QBox' },
    { keys: ['qb-core'],     label: 'QBCore' },
    { keys: ['es_extended'], label: 'ESX' },
    { keys: ['ox_core'],     label: 'ox_core' },
    { keys: ['vrp'],         label: 'vRP' },
  ];

  const VOICE_SYSTEMS = [
    { key: 'pma-voice',   label: 'pma-voice' },
    { key: 'saltychat',   label: 'SaltyChat' },
    { key: 'mumble-voip', label: 'Mumble VoIP' },
    { key: 'tokovoip',    label: 'TokoVoip' },
    { key: 'ws-voice',    label: 'WS Voice' },
  ];

  const BUILD_NAMES = {
    '1604': 'Los Santos Summer Special',
    '2060': 'Cayo Perico Heist',
    '2189': 'The Contract',
    '2372': 'Criminal Enterprises',
    '2545': 'Drug Wars',
    '2699': 'San Andreas Mercenaries',
    '2802': 'Chop Shop',
    '2944': 'Bottom Dollar Bounties',
    '3095': 'Bottom Dollar Bounties',
    '3258': 'Agents of Sabotage',
  };

  const BAN_SYSTEMS = [
    { key: 'bansystem',      label: 'BanSystem' },
    { key: 'ban_system',     label: 'BanSystem' },
    { key: 'ban_list',       label: 'BanList' },
    { key: 'banlist',        label: 'BanList' },
    { key: 'bl-banning',     label: 'BL-Banning' },
    { key: 'bm-ban',         label: 'BM-Ban' },
    { key: 'hardcap',        label: 'Hardcap' },
    { key: 'es_admin',       label: 'ES Admin' },
    { key: 'evolved_admin',  label: 'Evolved Admin' },
    { key: 'racingbanlist',  label: 'RacingBanList' },
  ];

  const WHITELIST_KEYS = ['whitelist', 'esx_whitelist', 'qb-whitelist', 'whitelist-system', 'fiveguard'];

  // Words that mean an "*_ac" / "*-ac" resource is NOT anti-cheat (e.g. air-conditioning scripts)
  const AC_EXCLUDE_WORDS = ['vehicle', 'car', 'house', 'home', 'interior', 'building', 'garage', 'climate', 'hvac', 'aircon'];

  const HIDDEN_VARS = ['sv_licenseKey', 'sv_licenseKeyToken', 'sv_steamApiKey', 'sv_tebexSecret'];

  const PREMIUM_NAMES = { pt: 'Platinum', au: 'Aurum', ag: 'Argentum' };

  const SUPPORT_STATUS = {
    supported:      { label: 'Supported',      cls: 'badge-green'  },
    end_of_support: { label: 'End of Support', cls: 'badge-yellow' },
    end_of_life:    { label: 'End of Life',    cls: 'badge-red'    },
    deprecated:     { label: 'Deprecated',     cls: 'badge-yellow' },
  };

  const HISTORY_KEY = 'fivem_history';
  const MAX_HISTORY = 5;

  // API hosts (declared before the auto-load below uses them — avoids a TDZ error)
  const API_HOSTS = [
    'https://servers-frontend.fivem.net/api/servers/single/',
    'https://frontend.cfx-services.net/api/servers/single/',
  ];

  let activeController = null;
  let currentCode      = null;
  let fetchedAt        = 0;

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveToHistory(code, name) {
    let hist = loadHistory().filter(h => h.code !== code);
    hist.unshift({ code, name });
    if (hist.length > MAX_HISTORY) hist = hist.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
    // Migrate away from old key
    localStorage.removeItem('fivem_last_code');
    renderHistory();
  }

  function renderHistory() {
    const hist = loadHistory();
    const wrap  = document.getElementById('recent-wrap');
    const chips = document.getElementById('recent-chips');
    if (!hist.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    chips.innerHTML = hist.map(h => {
      const code = escHtml(h.code);
      return `
      <div class="recent-chip" role="button" tabindex="0"
           onclick="loadFromHistory('${code}')"
           onkeydown="if((event.key==='Enter'||event.key===' ')&&event.target===event.currentTarget){event.preventDefault();loadFromHistory('${code}')}">
        <div class="recent-chip-text">
          <div class="recent-chip-name">${escHtml(h.name)}</div>
          <div class="recent-chip-code">${code}</div>
        </div>
        <button class="recent-remove" title="Remove" aria-label="Remove ${escHtml(h.name)}"
                onclick="event.stopPropagation();removeFromHistory('${code}')">×</button>
      </div>`;
    }).join('');
  }

  function loadFromHistory(code) {
    document.getElementById('code-input').value = code;
    lookup();
  }

  function removeFromHistory(code) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(loadHistory().filter(h => h.code !== code)));
    renderHistory();
  }

  // Migrate old single-code storage to history format
  const oldCode = localStorage.getItem('fivem_last_code');
  if (oldCode && !loadHistory().length) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify([{ code: oldCode, name: oldCode }]));
    localStorage.removeItem('fivem_last_code');
  }

  renderHistory();

  // Load ?code= from the URL if present, otherwise the most recent server
  const urlCode = new URLSearchParams(location.search).get('code');
  const hist = loadHistory();
  if (urlCode) {
    document.getElementById('code-input').value = urlCode;
    lookup();
  } else if (hist.length) {
    document.getElementById('code-input').value = hist[0].code;
    lookup();
  }

  document.getElementById('code-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') lookup();
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('lookup-btn').disabled = false;
  }

  function setLoading(on) {
    document.getElementById('loading').style.display = on ? 'block' : 'none';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('lookup-btn').disabled = on;
  }

  // Fetch a server, falling back to the secondary host on network / 5xx errors.
  // A 404 from any host is definitive — the server does not exist.
  async function fetchServer(code, signal) {
    let lastErr = null;
    for (const host of API_HOSTS) {
      let res;
      try {
        res = await fetch(host + code, { signal });
      } catch (e) {
        if (e.name === 'AbortError') throw e;
        lastErr = e;
        continue;
      }
      if (res.status === 404) throw new Error('Server not found. Check the code and try again.');
      if (!res.ok) { lastErr = new Error(`HTTP ${res.status}`); continue; }
      try {
        return await res.json();
      } catch (e) {
        if (e.name === 'AbortError') throw e;
        lastErr = e;
      }
    }
    throw lastErr || new Error('Failed to fetch server data.');
  }

  async function lookup() {
    const code = document.getElementById('code-input').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
    if (!code) { showError('Please enter a server code.'); return; }

    // Cancel any in-flight request so a slow earlier lookup can't overwrite a newer one
    if (activeController) activeController.abort();
    activeController = new AbortController();
    const signal = activeController.signal;

    document.getElementById('results').style.display = 'none';
    document.getElementById('results').innerHTML = '';
    setLoading(true);

    try {
      const json = await fetchServer(code, signal);
      const name = stripColor(json.Data?.hostname || json.Data?.vars?.sv_projectName || code);
      saveToHistory(code, name);
      render(json.Data, code);
      try { history.replaceState(null, '', `${location.pathname}?code=${code}`); } catch {}
    } catch (e) {
      if (e.name === 'AbortError') return;  // superseded by a newer lookup — let that request own the UI
      showError(e.message || 'Failed to fetch server data.');
    } finally {
      if (!signal.aborted) setLoading(false);
    }
  }

  function refresh() {
    if (!currentCode) return;
    document.getElementById('code-input').value = currentCode;
    lookup();
  }

  function updateFreshness() {
    const el = document.getElementById('fresh-text');
    if (!el || !fetchedAt) return;
    const s = Math.round((Date.now() - fetchedAt) / 1000);
    el.textContent =
      s < 10   ? 'Updated just now' :
      s < 60   ? `Updated ${s}s ago` :
      s < 3600 ? `Updated ${Math.floor(s / 60)}m ago` :
                 `Updated ${Math.floor(s / 3600)}h ago`;
  }
  setInterval(updateFreshness, 10000);

  function copyFeedback(el) {
    if (el._restore) clearTimeout(el._restore);
    else el._html = el.innerHTML;
    el.textContent = 'Copied!';
    el.classList.add('copied');
    el._restore = setTimeout(() => {
      el.innerHTML = el._html;
      el.classList.remove('copied');
      el._restore = null;
    }, 1200);
  }

  function copyText(text, el) {
    const fallback = () => {
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        ta.remove();
        if (ok) copyFeedback(el);
      } catch {}
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => copyFeedback(el)).catch(fallback);
    } else {
      fallback();
    }
  }

  function pingClass(ms) {
    if (ms <= 80)  return 'ping-good';
    if (ms <= 200) return 'ping-mid';
    return 'ping-bad';
  }

  function stripColor(str) {
    return (str || '').replace(/\^[0-9]/g, '').replace(/~[a-zA-Z0-9~]+~/g, '').trim();
  }

  function flagEmoji(cc) {
    if (!/^[A-Za-z]{2}$/.test(cc || '')) return '';
    return String.fromCodePoint(...[...cc.toUpperCase()].map(c => 0x1F1E6 - 65 + c.charCodeAt(0)));
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function render(d, code) {
    currentCode = code;
    fetchedAt   = Date.now();
    const vars      = d.vars || {};
    const resources = d.resources || [];
    const players   = [...(d.players || [])].sort((a, b) => (a.id ?? Infinity) - (b.id ?? Infinity));
    const tags      = (vars.tags || '').split(',').map(t => t.trim()).filter(Boolean);

    const serverName  = stripColor(d.hostname || vars.sv_projectName || 'Unknown Server');
    const maxPlayers  = d.svMaxclients || vars.sv_maxClients || '?';
    // d.clients is the authoritative count; the players array is empty when a server hides its list
    const playerCount = typeof d.clients === 'number' ? d.clients : players.length;
    const listHidden  = playerCount > 0 && players.length === 0;
    const gameType    = vars.gametype || '—';
    const mapName     = vars.mapname  || '—';
    const pureLevel   = vars.sv_pureLevel || '0';
    const desc        = stripColor(vars.sv_projectDesc || '');

    // Buttons
    const rawDiscord = vars.Discord || vars.discord || vars.sv_discord || vars.DISCORD || '';
    const discordUrl = rawDiscord ? (rawDiscord.startsWith('http') ? rawDiscord : 'https://' + rawDiscord) : null;
    const shareUrl   = `${location.origin}${location.pathname}?code=${code}`;

    // Resource lookups
    const rl = resources.map(r => r.toLowerCase());
    const detectedAC  = KNOWN_AC.filter(ac => ac.keys.some(k => rl.some(r => r.includes(k))));
    const knownACKeys = KNOWN_AC.flatMap(ac => ac.keys);
    const unknownAC   = resources.filter(r => {
      const lo = r.toLowerCase();
      return (lo.endsWith('_ac') || lo.endsWith('-ac')) &&
        !knownACKeys.some(k => lo.includes(k)) &&
        !AC_EXCLUDE_WORDS.some(w => lo.includes(w));
    });
    const framework   = FRAMEWORKS.find(f => f.keys.some(k => rl.includes(k)));
    const voice       = VOICE_SYSTEMS.find(v => rl.some(r => r.includes(v.key)));
    const banSystem   = BAN_SYSTEMS.find(b => rl.some(r => r.includes(b.key)));
    const whitelist   = WHITELIST_KEYS.some(k => rl.some(r => r.includes(k)));

    // Meta
    const gameBuild  = vars.sv_enforceGameBuild;
    const buildLabel = gameBuild ? `${gameBuild}${BUILD_NAMES[gameBuild] ? ' · ' + BUILD_NAMES[gameBuild] : ''}` : null;
    const onesyncRaw = vars.onesync_enabled || vars.sv_onesync || '';
    const onesyncOn  = ['true','1','on','legacy'].includes(onesyncRaw.toLowerCase());
    const scripthook = vars.sv_scriptHookAllowed === '1' || vars.sv_scriptHookAllowed === 'true';

    // Server identity / metadata
    const iconUrl      = d.iconVersion ? `https://frontend.cfx-services.net/api/servers/icon/${code}/${d.iconVersion}.png` : null;
    const ownerName    = d.ownerName || '';
    const ownerUrl     = d.ownerProfile || '';
    const ownerPic     = d.ownerAvatar || '';
    const upvotes      = (typeof d.upvotePower === 'number' && d.upvotePower > 0) ? d.upvotePower : null;
    const locale       = (vars.locale || '').trim();
    const regionLabel  = locale ? `${flagEmoji(locale.split('-')[1] || '')} ${escHtml(locale)}`.trim() : '';
    const premiumLabel = PREMIUM_NAMES[(vars.premium || '').toLowerCase()] || '';
    const support      = SUPPORT_STATUS[(d.support_status || '').toLowerCase()] || null;

    // Ping stats
    const pings   = players.map(p => p.ping).filter(p => typeof p === 'number' && p > 0);
    const pingAvg = pings.length ? Math.round(pings.reduce((a, b) => a + b, 0) / pings.length) : null;
    const pingMin = pings.length ? Math.min(...pings) : null;
    const pingMax = pings.length ? Math.max(...pings) : null;

    const fillPct    = maxPlayers !== '?' ? Math.min(100, Math.round((playerCount / maxPlayers) * 100)) : 0;
    const publicVars = Object.entries(vars).filter(([k]) =>
      !HIDDEN_VARS.includes(k) && !k.startsWith('_') && typeof vars[k] === 'string' && vars[k].length > 0
    );

    document.getElementById('results').innerHTML = `

      <!-- Server header -->
      <div class="server-header">
        <div class="server-title-row">
          <div class="server-id-row">
            ${iconUrl ? `<img class="server-icon" src="${escHtml(iconUrl)}" alt="" onerror="this.remove()" />` : ''}
            <div style="flex:1;min-width:0">
              <div class="server-name">${escHtml(serverName)}</div>
              ${ownerName ? `
              <div class="server-owner">
                ${ownerPic ? `<img src="${escHtml(ownerPic)}" alt="" onerror="this.remove()" />` : ''}
                <span>Owned by ${ownerUrl
                  ? `<a href="${escHtml(ownerUrl)}" target="_blank" rel="noopener">${escHtml(ownerName)}</a>`
                  : escHtml(ownerName)}</span>
              </div>` : ''}
            </div>
          </div>
          <div class="btn-group">
            ${discordUrl ? `<a class="btn btn-discord" href="${escHtml(discordUrl)}" target="_blank" rel="noopener">Discord</a>` : ''}
            <button class="btn btn-ghost" data-copy="${escHtml(shareUrl)}" onclick="copyText(this.dataset.copy, this)">Copy Link</button>
            <a class="btn btn-accent" href="fivem://connect/${escHtml(code)}">Direct Connect</a>
          </div>
        </div>
        <div class="server-meta">
          <span class="badge badge-copy" title="Click to copy" data-copy="${escHtml(code)}" onclick="copyText(this.dataset.copy, this)">Code: <strong>${escHtml(code)}</strong></span>
          <span class="badge">Game: <strong>${escHtml(gameType)}</strong></span>
          <span class="badge">Map: <strong>${escHtml(mapName)}</strong></span>
          ${buildLabel ? `<span class="badge">Build: <strong>${escHtml(buildLabel)}</strong></span>` : ''}
          ${onesyncRaw ? `<span class="badge">OneSync: <strong>${onesyncOn ? 'On' : 'Off'}</strong></span>` : ''}
          ${regionLabel ? `<span class="badge">Region: <strong>${regionLabel}</strong></span>` : ''}
          ${premiumLabel ? `<span class="badge">Tier: <strong>${escHtml(premiumLabel)}</strong></span>` : ''}
          ${upvotes !== null ? `<span class="badge">Upvotes: <strong>↑ ${upvotes}</strong></span>` : ''}
          ${support ? `<span class="badge ${support.cls}">${support.label}</span>` : ''}
        </div>
        <div class="freshness">
          <span id="fresh-text">Updated just now</span>
          <span style="color:var(--border)">·</span>
          <button class="link-btn" onclick="refresh()">Refresh</button>
        </div>
        ${desc ? `
          <div class="server-desc" id="srv-desc">${escHtml(desc)}</div>
          <button class="desc-toggle" onclick="toggleDesc()">Show more</button>
        ` : ''}
      </div>

      <!-- Stat cards (2-column grid) -->
      <div class="grid">

        <!-- Players -->
        <div class="card">
          <div class="card-label">Players</div>
          <div class="player-count">${playerCount}<span class="denom"> / ${maxPlayers}</span></div>
          <div class="player-bar-wrap">
            <div class="player-bar" style="width:${fillPct}%"></div>
          </div>
          ${pingAvg !== null ? `
          <div class="ping-stats">
            <div class="ping-stat">
              <div class="ping-stat-val col-green">${pingMin} ms</div>
              <div class="ping-stat-lbl">Best</div>
            </div>
            <div class="ping-stat">
              <div class="ping-stat-val">${pingAvg} ms</div>
              <div class="ping-stat-lbl">Avg</div>
            </div>
            <div class="ping-stat">
              <div class="ping-stat-val col-red">${pingMax} ms</div>
              <div class="ping-stat-lbl">Worst</div>
            </div>
          </div>` : ''}
        </div>

        <!-- Anti-cheat -->
        <div class="card">
          <div class="card-label">Anti-Cheat</div>
          ${(detectedAC.length || unknownAC.length)
            ? `<div class="ac-status ac-detected">Detected</div>
               <div class="ac-chips">
                 ${detectedAC.map(ac => `<span class="chip chip-green">${escHtml(ac.label)}</span>`).join('')}
                 ${unknownAC.map(r => `<span class="chip chip-green">${escHtml(r)}</span>`).join('')}
               </div>`
            : `<div class="ac-status ac-none">None detected</div>
               <div class="sub-text" style="margin-top:8px">No known AC resources found</div>`}
          <div class="stack-rows" style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
            <div class="stack-row">
              <span class="stack-lbl">Pure Level</span>
              <span class="stack-val ${pureLevel === '2' ? 'col-green' : pureLevel === '1' ? '' : 'col-muted'}">
                ${{ '0': 'Off', '1': 'Level 1', '2': 'Strict' }[pureLevel] || `Level ${escHtml(pureLevel)}`}
              </span>
            </div>
            <div class="stack-row">
              <span class="stack-lbl">Whitelist</span>
              <span class="stack-val ${whitelist ? 'col-green' : 'col-muted'}">${whitelist ? 'Enabled' : 'None detected'}</span>
            </div>
            <div class="stack-row">
              <span class="stack-lbl">Ban System</span>
              <span class="stack-val ${banSystem ? 'col-green' : 'col-muted'}">${banSystem ? escHtml(banSystem.label) : 'None detected'}</span>
            </div>
            <div class="stack-row">
              <span class="stack-lbl">Scripthook</span>
              <span class="stack-val ${scripthook ? 'col-red' : 'col-green'}">${scripthook ? 'Allowed' : 'Blocked'}</span>
            </div>
          </div>
        </div>

        <!-- Resources -->
        <div class="card">
          <div class="card-label">Resources</div>
          <div class="big-num">${resources.length}</div>
          <div class="sub-text">Total loaded resources</div>
        </div>

        <!-- Server stack -->
        <div class="card">
          <div class="card-label">Server Stack</div>
          <div class="stack-rows">
            <div class="stack-row">
              <span class="stack-lbl">Framework</span>
              <span class="stack-val ${framework ? '' : 'col-muted'}">${framework ? escHtml(framework.label) : 'Unknown'}</span>
            </div>
            <div class="stack-row">
              <span class="stack-lbl">Voice Chat</span>
              <span class="stack-val ${voice ? '' : 'col-muted'}">${voice ? escHtml(voice.label) : 'Unknown'}</span>
            </div>
          </div>
        </div>

      </div>

      <!-- Tags -->
      ${tags.length ? `
      <div class="full-card">
        <div class="card-label">Tags</div>
        <div class="tags-wrap">${tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>
      </div>` : ''}

      <!-- Player list -->
      <div class="full-card">
        <div class="card-header">
          <div class="card-label" style="margin:0">Player List</div>
          <input class="filter-input" id="player-search" placeholder="Search players…" oninput="filterPlayers()" />
        </div>
        ${players.length ? `
        <table class="player-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Ping</th>
            </tr>
          </thead>
          <tbody id="player-tbody">
            ${players.map((p, i) => `
            <tr data-name="${escHtml((p.name || '').toLowerCase())}" data-identifiers="${escHtml(JSON.stringify(p.identifiers || []))}">
              <td>${p.id ?? i + 1}</td>
              <td class="player-name" onclick="toggleIdentifiers(this)">${escHtml(p.name || 'Unknown')}</td>
              <td><span class="ping-pill ${pingClass(p.ping)}">${p.ping ?? '?'} ms</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
        <div class="empty-state" id="no-players" style="display:none">No players match your search.</div>
        ` : `<div class="empty-state">${listHidden
          ? 'This server keeps its player list private.'
          : 'No players currently online.'}</div>`}
      </div>

      <!-- Server variables -->
      ${publicVars.length ? `
      <div class="full-card">
        <div class="card-label">Server Variables</div>
        <table class="vars-table">
          <tbody>
            ${publicVars.map(([k, v]) => `
            <tr>
              <td>${escHtml(k)}</td>
              <td>${escHtml(v)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>` : ''}

      <!-- All resources -->
      ${resources.length ? `
      <div class="full-card">
        <div class="card-header">
          <div class="card-label" style="margin:0">All Resources <span id="res-count" style="color:var(--muted);font-weight:400">(${resources.length})</span></div>
          <input class="filter-input" id="res-search" placeholder="Search resources…" oninput="filterResources()" />
        </div>
        <div class="resource-grid" id="resource-grid">
          ${resources.map(r => {
            const isAC = KNOWN_AC.some(ac => ac.keys.some(k => r.toLowerCase().includes(k)));
            return `<span class="res-chip${isAC ? ' ac-highlight' : ''}" data-name="${escHtml(r.toLowerCase())}">${escHtml(r)}</span>`;
          }).join('')}
        </div>
        <button class="toggle-btn" id="res-toggle" onclick="toggleResources()">Show all resources</button>
      </div>` : ''}

    `;

    document.getElementById('results').style.display = 'block';
  }

  const ID_LABELS = {
    steam:   'Steam',
    license: 'License',
    discord: 'Discord',
    fivem:   'FiveM',
    xbl:     'Xbox Live',
    live:    'Microsoft',
    ip:      'IP',
  };

  function toggleIdentifiers(nameCell) {
    const row  = nameCell.closest('tr');
    const next = row.nextElementSibling;

    // Collapse if already open
    if (next && next.classList.contains('id-row')) {
      next.remove();
      nameCell.classList.remove('open');
      return;
    }

    // Close any other open rows first
    document.querySelectorAll('.id-row').forEach(r => r.remove());
    document.querySelectorAll('.player-name.open').forEach(n => n.classList.remove('open'));

    nameCell.classList.add('open');

    const identifiers = JSON.parse(row.dataset.identifiers || '[]');
    const detailRow   = document.createElement('tr');
    detailRow.className = 'id-row';

    const items = identifiers.length
      ? identifiers.map(id => {
          const sep   = id.indexOf(':');
          const type  = id.substring(0, sep);
          const value = id.substring(sep + 1);
          const label = ID_LABELS[type] || type;
          let   val     = escHtml(value);
          let   copyVal = value;

          if (type === 'steam') {
            try {
              const steam64 = BigInt('0x' + value).toString();
              val     = `<a href="https://steamcommunity.com/profiles/${steam64}" target="_blank" rel="noopener">${steam64}</a>`;
              copyVal = steam64;
            } catch {}
          }

          return `<div class="id-entry">
            <span class="id-type">${label}</span>
            <span class="id-val">${val}</span>
            <button class="id-copy" data-copy="${escHtml(copyVal)}" onclick="copyText(this.dataset.copy, this)">Copy</button>
          </div>`;
        }).join('')
      : '<span style="color:var(--muted);font-size:0.82rem">No identifiers available</span>';

    detailRow.innerHTML = `<td colspan="3"><div class="id-list">${items}</div></td>`;
    row.after(detailRow);
  }

  function filterPlayers() {
    const q = document.getElementById('player-search').value.toLowerCase();
    const rows = document.querySelectorAll('#player-tbody tr');
    let visible = 0;
    rows.forEach(row => {
      const match = row.dataset.name.includes(q);
      row.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    const noEl = document.getElementById('no-players');
    if (noEl) noEl.style.display = visible === 0 ? 'block' : 'none';
  }

  function toggleDesc() {
    const el  = document.getElementById('srv-desc');
    const btn = el.nextElementSibling;
    el.classList.toggle('expanded');
    btn.textContent = el.classList.contains('expanded') ? 'Show less' : 'Show more';
  }

  function filterResources() {
    const q     = document.getElementById('res-search').value.toLowerCase().trim();
    const grid  = document.getElementById('resource-grid');
    const btn   = document.getElementById('res-toggle');
    const chips = document.querySelectorAll('#resource-grid .res-chip');
    const total = chips.length;

    if (!q) {
      chips.forEach(c => c.style.display = '');
      grid.classList.remove('expanded');
      btn.style.display = '';
      document.getElementById('res-count').textContent = `(${total})`;
      return;
    }

    grid.classList.add('expanded');
    btn.style.display = 'none';

    let visible = 0;
    chips.forEach(c => {
      const match = c.dataset.name.includes(q);
      c.style.display = match ? '' : 'none';
      if (match) visible++;
    });

    document.getElementById('res-count').textContent = `(${visible} / ${total})`;
  }

  function toggleResources() {
    const grid = document.getElementById('resource-grid');
    const btn  = document.getElementById('res-toggle');
    grid.classList.toggle('expanded');
    btn.textContent = grid.classList.contains('expanded') ? 'Show less' : 'Show all resources';
  }
</script>

</body>
</html>
